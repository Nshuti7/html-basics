<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      .box {
        padding-top: 20px;
        padding-bottom: 20px;
        background-color: indigo;
        width: 980px;
        height: 550px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-direction: column;
      }

      .box1 {
        background-color: orange;
        width: 932px;
        height: 50px;
      }

      .box2 {
        padding: 15px;
        background-color: white;
        width: 900px;
        height: 370px;
        display: flex;
        justify-content: space-between;
      }

      .box3 {
        background-color: orange;
        width: 932px;
        height: 50px;
      }

      .box21 {
        background-color: red;
        width: 69%;
        height: 370px;
      }
      .box22 {
        background-color: orange;
        width: 29%;
        height: 370px;
      }
    </style>
    <title>Document</title>
  </head>
  <body>
    <div class="box">
      <div class="box1"></div>
      <div class="box2">
        <div class="box21"></div>
        <div class="box22"></div>
      </div>
      <div class="box3"></div>
    </div>
  </body>
</html>
